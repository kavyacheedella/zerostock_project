<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zeerostock – Inventory Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #2563eb;
      --primary-h: #1d4ed8;
      --surface:   #f8fafc;
      --card:      #ffffff;
      --border:    #e2e8f0;
      --text:      #1e293b;
      --muted:     #64748b;
      --danger:    #ef4444;
      --success:   #10b981;
      --tag-bg:    #eff6ff;
      --tag-text:  #2563eb;
      --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --radius:    10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(37,99,235,.3);
    }
    header .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
    header .tagline { font-size: .85rem; opacity: .8; margin-top: 2px; }

    /* ── Tabs ────────────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
      background: var(--card);
      padding: 0 32px;
    }
    .tab-btn {
      padding: 14px 24px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      font-size: .95rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      margin-bottom: -2px;
      transition: color .2s, border-color .2s;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── Main layout ─────────────────────── */
    .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Filter card ─────────────────────── */
    .filter-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }
    .filter-card h2 { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 16px; }
    .filter-row {
      display: grid;
      grid-template-columns: 2fr 1.2fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }
    @media (max-width: 768px) {
      .filter-row { grid-template-columns: 1fr 1fr; }
      .filter-row .search-btn { grid-column: span 2; }
    }
    .field label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: .9rem;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus, .field select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .search-btn {
      padding: 9px 20px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      display: flex; align-items: center; gap: 6px;
    }
    .search-btn:hover { background: var(--primary-h); }
    .clear-btn {
      padding: 9px 14px;
      background: #f1f5f9;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: .85rem;
      cursor: pointer;
      transition: background .2s;
    }
    .clear-btn:hover { background: #e2e8f0; }

    /* ── Results meta ────────────────────── */
    .results-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      font-size: .88rem;
    }
    .results-count { color: var(--muted); }
    .results-count strong { color: var(--text); }

    /* ── Error / Empty states ────────────── */
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--danger);
      padding: 12px 16px;
      border-radius: 7px;
      margin-bottom: 16px;
      font-size: .88rem;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 1rem; }

    /* ── Results table ───────────────────── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    thead { background: #f8fafc; }
    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }
    tbody td { padding: 13px 16px; vertical-align: middle; }
    .product-name { font-weight: 600; color: var(--text); }
    .supplier { font-size: .8rem; color: var(--muted); margin-top: 2px; }
    .category-tag {
      display: inline-block;
      padding: 3px 10px;
      background: var(--tag-bg);
      color: var(--tag-text);
      border-radius: 50px;
      font-size: .75rem;
      font-weight: 600;
    }
    .price { font-weight: 700; color: var(--text); }
    .qty { color: var(--muted); }

    /* ── Inventory Panel (Assignment B) ──── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .form-card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
    .form-field { margin-bottom: 12px; }
    .form-field label {
      display: block; font-size: .8rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: .4px; margin-bottom: 5px;
    }
    .form-field input, .form-field select {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border); border-radius: 7px;
      font-size: .9rem; color: var(--text); outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-field input:focus, .form-field select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .submit-btn {
      width: 100%; padding: 10px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 7px;
      font-size: .9rem; font-weight: 700;
      cursor: pointer; transition: background .2s;
      margin-top: 4px;
    }
    .submit-btn:hover { background: var(--primary-h); }
    .form-msg {
      margin-top: 10px; padding: 10px 14px;
      border-radius: 7px; font-size: .85rem; display: none;
    }
    .form-msg.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; display: block; }
    .form-msg.error   { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; display: block; }

    /* ── Grouped Inventory Table ─────────── */
    .group-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .group-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px;
      background: #f1f5f9;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .group-header .supplier-name { font-weight: 700; font-size: .95rem; }
    .group-header .supplier-meta { font-size: .8rem; color: var(--muted); margin-top: 2px; }
    .group-header .total-value {
      font-weight: 700; color: var(--primary); font-size: .95rem;
    }
    .refresh-btn {
      padding: 8px 16px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 7px;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      margin-bottom: 16px;
    }
    .refresh-btn:hover { background: var(--primary-h); }

    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: .9rem; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">📦 Zeerostock</div>
    <div class="tagline">Surplus Inventory Marketplace</div>
  </div>
</header>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('search')">🔍 Search Inventory</button>
  <button class="tab-btn" onclick="switchTab('manage')">🏷️ Manage Inventory</button>
</div>

<div class="container">

  <!-- ══ PANEL A: Search ══════════════════════════════════════ -->
  <div id="tab-search" class="panel active">

    <div class="filter-card">
      <h2>Filter Products</h2>
      <div class="filter-row">
        <div class="field">
          <label>Product Name</label>
          <input id="q" type="text" placeholder="e.g. Laptop, Mouse…" oninput="debouncedSearch()" />
        </div>
        <div class="field">
          <label>Category</label>
          <select id="category" onchange="doSearch()">
            <option value="">All Categories</option>
            <option>Electronics</option>
            <option>Furniture</option>
            <option>Accessories</option>
            <option>Stationery</option>
          </select>
        </div>
        <div class="field">
          <label>Min Price (₹)</label>
          <input id="minPrice" type="number" min="0" placeholder="0" onchange="doSearch()" />
        </div>
        <div class="field">
          <label>Max Price (₹)</label>
          <input id="maxPrice" type="number" min="0" placeholder="∞" onchange="doSearch()" />
        </div>
        <div class="field" style="display:flex;gap:8px;align-items:flex-end;">
          <button class="search-btn" onclick="doSearch()">Search</button>
          <button class="clear-btn" onclick="clearFilters()">Clear</button>
        </div>
      </div>
    </div>

    <div id="error-msg" class="error-msg" style="display:none;"></div>

    <div class="results-meta">
      <span class="results-count" id="results-count"></span>
    </div>

    <div id="results-container"></div>
  </div>

  <!-- ══ PANEL B: Manage ══════════════════════════════════════ -->
  <div id="tab-manage" class="panel">

    <div class="grid-2">

      <!-- Add Supplier -->
      <div class="form-card">
        <h2>➕ Add Supplier</h2>
        <div class="form-field">
          <label>Company Name</label>
          <input id="sup-name" type="text" placeholder="e.g. TechCorp India" />
        </div>
        <div class="form-field">
          <label>City</label>
          <input id="sup-city" type="text" placeholder="e.g. Hyderabad" />
        </div>
        <button class="submit-btn" onclick="addSupplier()">Add Supplier</button>
        <div id="sup-msg" class="form-msg"></div>
      </div>

      <!-- Add Inventory -->
      <div class="form-card">
        <h2>📦 Add Inventory Item</h2>
        <div class="form-field">
          <label>Supplier</label>
          <select id="inv-supplier"></select>
        </div>
        <div class="form-field">
          <label>Product Name</label>
          <input id="inv-name" type="text" placeholder="e.g. USB-C Cable" />
        </div>
        <div class="form-field">
          <label>Category</label>
          <select id="inv-category">
            <option>Electronics</option>
            <option>Furniture</option>
            <option>Accessories</option>
            <option>Stationery</option>
            <option>General</option>
          </select>
        </div>
        <div class="form-field">
          <label>Quantity</label>
          <input id="inv-qty" type="number" min="0" placeholder="0" />
        </div>
        <div class="form-field">
          <label>Price (₹)</label>
          <input id="inv-price" type="number" min="0.01" step="0.01" placeholder="0.00" />
        </div>
        <button class="submit-btn" onclick="addInventory()">Add Item</button>
        <div id="inv-msg" class="form-msg"></div>
      </div>
    </div>

    <!-- Grouped Inventory View -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <h2 style="font-size:1rem;font-weight:700;">📊 Inventory by Supplier (sorted by total value)</h2>
      <button class="refresh-btn" onclick="loadGrouped()">↻ Refresh</button>
    </div>
    <div id="grouped-container"><div class="loading">Loading inventory…</div></div>

  </div>
</div>

<script>
  const BASE = "";  // same origin

  // ── Tab switch ──────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("tab-" + name).classList.add("active");
    event.currentTarget.classList.add("active");
    if (name === "manage") { loadSuppliers(); loadGrouped(); }
  }

  // ── Debounce for text input ─────────────────────────────
  let debTimer;
  function debouncedSearch() {
    clearTimeout(debTimer);
    debTimer = setTimeout(doSearch, 350);
  }

  // ── Search ──────────────────────────────────────────────
  async function doSearch() {
    const q        = document.getElementById("q").value.trim();
    const category = document.getElementById("category").value;
    const minPrice = document.getElementById("minPrice").value;
    const maxPrice = document.getElementById("maxPrice").value;
    const errEl    = document.getElementById("error-msg");
    const cntEl    = document.getElementById("results-count");
    const resEl    = document.getElementById("results-container");

    errEl.style.display = "none";

    const params = new URLSearchParams();
    if (q)        params.set("q",        q);
    if (category) params.set("category", category);
    if (minPrice) params.set("minPrice", minPrice);
    if (maxPrice) params.set("maxPrice", maxPrice);

    try {
      const r = await fetch(`/search?${params}`);
      const d = await r.json();

      if (!r.ok) {
        errEl.textContent = d.error;
        errEl.style.display = "block";
        cntEl.textContent = "";
        resEl.innerHTML = "";
        return;
      }

      cntEl.innerHTML = `Showing <strong>${d.count}</strong> result${d.count !== 1 ? "s" : ""}`;
      resEl.innerHTML = d.count === 0 ? emptyState() : buildTable(d.results);

    } catch (e) {
      errEl.textContent = "Could not reach server. Make sure the backend is running.";
      errEl.style.display = "block";
    }
  }

  function clearFilters() {
    ["q","minPrice","maxPrice"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("category").value = "";
    doSearch();
  }

  function emptyState() {
    return `<div class="empty-state">
      <div class="icon">🔍</div>
      <p>No results found. Try different filters.</p>
    </div>`;
  }

  function buildTable(rows) {
    const trs = rows.map(r => `
      <tr>
        <td>
          <div class="product-name">${esc(r.product_name)}</div>
          <div class="supplier">${esc(r.supplier_name)} · ${esc(r.supplier_city)}</div>
        </td>
        <td><span class="category-tag">${esc(r.category)}</span></td>
        <td class="qty">${r.quantity.toLocaleString()}</td>
        <td class="price">₹${Number(r.price).toLocaleString("en-IN")}</td>
      </tr>`).join("");

    return `<div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Product / Supplier</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Price</th>
          </tr>
        </thead>
        <tbody>${trs}</tbody>
      </table>
    </div>`;
  }

  // ── Suppliers dropdown ──────────────────────────────────
  async function loadSuppliers() {
    const r = await fetch("/suppliers");
    const list = await r.json();
    const sel = document.getElementById("inv-supplier");
    sel.innerHTML = list.map(s =>
      `<option value="${s.id}">${esc(s.name)} – ${esc(s.city)}</option>`
    ).join("") || '<option value="">No suppliers yet</option>';
  }

  // ── Add Supplier ────────────────────────────────────────
  async function addSupplier() {
    const name = document.getElementById("sup-name").value.trim();
    const city = document.getElementById("sup-city").value.trim();
    const msg  = document.getElementById("sup-msg");
    msg.className = "form-msg";

    try {
      const r = await fetch("/supplier", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, city })
      });
      const d = await r.json();
      if (r.ok) {
        msg.textContent = `✅ ${d.message} (ID: ${d.supplier.id})`;
        msg.className = "form-msg success";
        document.getElementById("sup-name").value = "";
        document.getElementById("sup-city").value = "";
        loadSuppliers();
        loadGrouped();
      } else {
        msg.textContent = "❌ " + d.error;
        msg.className = "form-msg error";
      }
    } catch { msg.textContent = "❌ Server error."; msg.className = "form-msg error"; }
  }

  // ── Add Inventory ───────────────────────────────────────
  async function addInventory() {
    const body = {
      supplier_id:  parseInt(document.getElementById("inv-supplier").value),
      product_name: document.getElementById("inv-name").value.trim(),
      category:     document.getElementById("inv-category").value,
      quantity:     parseInt(document.getElementById("inv-qty").value),
      price:        parseFloat(document.getElementById("inv-price").value),
    };
    const msg = document.getElementById("inv-msg");
    msg.className = "form-msg";

    try {
      const r = await fetch("/inventory", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const d = await r.json();
      if (r.ok) {
        msg.textContent = `✅ ${d.message} (ID: ${d.item.id})`;
        msg.className = "form-msg success";
        ["inv-name","inv-qty","inv-price"].forEach(id => document.getElementById(id).value = "");
        loadGrouped();
      } else {
        msg.textContent = "❌ " + d.error;
        msg.className = "form-msg error";
      }
    } catch { msg.textContent = "❌ Server error."; msg.className = "form-msg error"; }
  }

  // ── Grouped Inventory ────────────────────────────────────
  async function loadGrouped() {
    const container = document.getElementById("grouped-container");
    container.innerHTML = '<div class="loading">Loading…</div>';
    try {
      const r = await fetch("/inventory");
      const d = await r.json();
      if (!d.data || d.data.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>No inventory items yet.</p></div>';
        return;
      }
      container.innerHTML = d.data.map(group => `
        <div class="group-section">
          <div class="group-header">
            <div>
              <div class="supplier-name">🏢 ${esc(group.supplier_name)}</div>
              <div class="supplier-meta">${esc(group.supplier_city)} · ${group.items.length} item${group.items.length !== 1 ? "s" : ""}</div>
            </div>
            <div class="total-value">₹${Number(group.total_value).toLocaleString("en-IN")}</div>
          </div>
          <table style="width:100%;border-collapse:collapse;font-size:.85rem;">
            <thead style="background:#f8fafc;">
              <tr>
                <th style="padding:10px 16px;text-align:left;color:#64748b;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0;">Product</th>
                <th style="padding:10px 16px;text-align:left;color:#64748b;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0;">Category</th>
                <th style="padding:10px 16px;text-align:right;color:#64748b;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0;">Qty</th>
                <th style="padding:10px 16px;text-align:right;color:#64748b;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0;">Price</th>
                <th style="padding:10px 16px;text-align:right;color:#64748b;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0;">Value</th>
              </tr>
            </thead>
            <tbody>
              ${group.items.map(item => `
                <tr style="border-bottom:1px solid #f1f5f9;">
                  <td style="padding:10px 16px;font-weight:600;">${esc(item.product_name)}</td>
                  <td style="padding:10px 16px;"><span class="category-tag">${esc(item.category)}</span></td>
                  <td style="padding:10px 16px;text-align:right;color:#64748b;">${item.quantity}</td>
                  <td style="padding:10px 16px;text-align:right;">₹${Number(item.price).toLocaleString("en-IN")}</td>
                  <td style="padding:10px 16px;text-align:right;font-weight:600;">₹${(item.quantity * item.price).toLocaleString("en-IN")}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>`).join("");
    } catch {
      container.innerHTML = '<div class="empty-state"><p>Could not load inventory.</p></div>';
    }
  }

  function esc(str) {
    return String(str ?? "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  // ── Initial load ─────────────────────────────────────────
  doSearch();
</script>
</body>
</html>
